<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SwiftSpend</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container py-5">

    <!-- Header -->
    <div class="text-center mb-5">
        <h1 class="fw-bold gradient-text">SwiftSpend</h1>
        <p class="text-muted">Smart Personal Finance Dashboard</p>
    </div>

    <!-- Card -->
    <div class="card glass-card p-4 shadow-lg">

        <!-- Form -->
        <form id="form">
            <div class="row g-3">

                <div class="col-md-4">
                    <label class="form-label">Transaction Type</label>
                    <select class="form-select" id="type" required>
                        <option value="">Select</option>
                        <option value="INCOME">Income</option>
                        <option value="EXPENSE">Expense</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Category</label>
                    <select class="form-select" id="category" required>
                        <option value="">Select</option>
                        <option value="Needs">Needs</option>
                        <option value="Wants">Wants</option>
                        <option value="Savings">Savings</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Amount</label>
                    <input type="number" class="form-control" id="amount" placeholder="Enter amount" required>
                </div>

            </div>

            <div class="text-center mt-4">
                <button class="btn btn-primary px-5">Add Transaction</button>
            </div>
        </form>

        <!-- Buttons -->
        <div class="text-center mt-4">
            <button class="btn btn-success me-2" onclick="loadSummary()">View Summary</button>
            <button class="btn btn-warning" onclick="exportData()">Export CSV</button>
        </div>

    </div>

    <!-- Table Section -->
    <div class="card mt-5 p-4 shadow-sm">

        <h5 class="mb-3">Transaction History</h5>

        <div class="table-responsive">
            <table class="table align-middle">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Type</th>
                    <th>Category</th>
                    <th>Amount</th>
                </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

    </div>

    <!-- Summary Box -->
    <div class="card mt-4 p-4 shadow-sm">
        <h5>Summary</h5>
        <pre id="summaryBox" class="summary-box"></pre>
    </div>

</div>

<script src="app.js"></script>
</body>
</html>
